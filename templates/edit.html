<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Post</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <main class="container pagina-formulario">
        <a class="voltar" href="/">← Voltar para a página inicial</a>

        {% if post %}
            <section class="painel-formulario">
                <p class="marca">Mini Fórum Web</p>
                <h1>Editar post</h1>
                <p class="subtitulo">Atualize os campos abaixo e salve as alterações.</p>

                <form action="/edit/{{ post.id }}" method="post" class="formulario-post">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" name="titulo" value="{{ post.titulo }}" required>

                    <label for="resumo">Resumo</label>
                    <input type="text" id="resumo" name="resumo" value="{{ post.resumo }}" required>

                    <label for="conteudo">Conteúdo</label>
                    <textarea id="conteudo" name="conteudo" rows="8" required>{{ post.conteudo }}</textarea>

                    <label for="autor">Autor</label>
                    <input type="text" id="autor" name="autor" value="{{ post.autor }}" required>

                    <div class="grupo-botoes">
                        <button class="botao botao-destaque" type="submit">Salvar alterações</button>
                        <a class="botao botao-secundario" href="/">Cancelar</a>
                    </div>
                </form>
            </section>
        {% else %}
            <section class="vazio">
                <h1>Post não encontrado</h1>
                <p>Não foi possível editar porque o post informado não existe.</p>
                <a class="botao botao-destaque" href="/">Voltar ao início</a>
            </section>
        {% endif %}
    </main>

    <script src="{{ url_for('static', path='js/script.js') }}"></script>
</body>
</html>
