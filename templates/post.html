<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Post</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <main class="container pagina-detalhe">
        <a class="voltar" href="/">← Voltar para a página inicial</a>

        {% if post %}
            <article class="post-completo">
                <p class="meta">Post #{{ post.id }} · Autor: {{ post.autor }}</p>
                <h1>{{ post.titulo }}</h1>
                <p class="resumo-destaque">{{ post.resumo }}</p>
                <div class="conteudo-post">
                    <p>{{ post.conteudo }}</p>
                </div>

                <div class="acoes-detalhe">
                    <a class="botao botao-secundario" href="/edit/{{ post.id }}">Editar post</a>
                    <form action="/delete/{{ post.id }}" method="post">
                        <button class="botao botao-perigo" type="submit">Excluir post</button>
                    </form>
                </div>
            </article>
        {% else %}
            <section class="vazio">
                <h1>Post não encontrado</h1>
                <p>O post solicitado não existe mais ou nunca foi criado.</p>
                <a class="botao botao-destaque" href="/">Voltar ao início</a>
            </section>
        {% endif %}
    </main>

    <script src="{{ url_for('static', path='js/script.js') }}"></script>
</body>
</html>
